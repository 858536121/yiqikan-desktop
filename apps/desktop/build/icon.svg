<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#e11d48"/>
    </linearGradient>
    <linearGradient id="screen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.95)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.85)"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="480" height="480" rx="112" ry="112" fill="url(#bg)"/>
  <!-- Back screen (offset right-up) -->
  <rect x="196" y="128" width="200" height="148" rx="20" ry="20" fill="rgba(255,255,255,0.4)"/>
  <!-- Front screen (offset left-down) -->
  <rect x="116" y="196" width="200" height="148" rx="20" ry="20" fill="url(#screen)"/>
  <!-- Play triangle on front screen -->
  <polygon points="196,245 196,305 242,275" fill="url(#bg)" opacity="0.9"/>
  <!-- Small connection dot between screens -->
  <circle cx="296" cy="248" r="14" fill="white" opacity="0.9"/>
  <circle cx="296" cy="248" r="6" fill="url(#bg)"/>
</svg>
